name: Benchmark

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run fetch strategy benchmarks
        run: cargo bench -p pulith-fetch --bench multi_source -- --sample-size 10 --measurement-time 1

      - name: Run install pipeline benchmark
        run: cargo bench -p pulith-install --bench pipeline -- --sample-size 10 --measurement-time 1

      - name: Run transition threshold benchmarks
        run: cargo bench -p pulith-install --bench copy_transition -- --sample-size 10 --measurement-time 1

      - name: Upload criterion reports
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports
          path: target/criterion
          if-no-files-found: warn
